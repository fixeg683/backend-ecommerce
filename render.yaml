services:
  - type: web
    name: esoko-backend
    env: python
    buildCommand: ./build.sh
    startCommand: gunicorn core.wsgi:application
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DJANGO_SETTINGS_MODULE
        value: core.settings
      - key: DEBUG
        value: "False"
      - fromDatabase:
          name: esoko-db # If using Render's Managed Postgres
          property: connectionString