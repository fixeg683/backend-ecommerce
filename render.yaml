services:
  - type: web
    name: esoko-backend
    env: python
    buildCommand: ./build.sh
    startCommand: gunicorn core.wsgi:application --config gunicorn.conf.py
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.0
      - key: DJANGO_SETTINGS_MODULE
        value: core.settings
      - key: DEBUG
        value: "False"